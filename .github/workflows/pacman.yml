name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    # 🌟 CRITICAL: Explicitly grant write permission to the GITHUB_TOKEN
    permissions:
      contents: write 
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Move generated graph to output directory
        run: |
          mkdir -p dist
          mv pacman-contribution-graph*.svg dist/

      - name: Push to output branch using Git CLI
        run: |
          # Configure Git user for the commit
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          
          # Create the output branch if it doesn't exist
          git checkout --orphan output
          
          # Remove all files from the current branch
          git rm -rf .
          
          # Move generated files to the root of the output branch
          mv dist/* .
          rm -rf dist
          
          # Stage, commit, and push the changes
          git add .
          git commit -m "feat: Update Pac-Man contribution graph"
          
          # 🌟 CRITICAL: Use the token to push to the remote branch
          # This command uses the token directly in the push URL
          git push --force "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" output
