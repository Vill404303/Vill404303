name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    # CRITICAL: Grant write permission to the GITHUB_TOKEN for pushing files
    permissions:
      contents: write 
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Move generated graph to output directory
        run: |
          mkdir -p dist
          mv pacman-contribution-graph*.svg dist/

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3 
        with:
          # 👇 These three lines are the required configuration for peaceiris/actions-gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
